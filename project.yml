name: SmoothSnap
options:
  bundleIdPrefix: com.smoothmac
  deploymentTarget:
    macOS: "13.0"
  defaultConfig: Debug

settings:
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "13.0"
  PRODUCT_BUNDLE_IDENTIFIER: com.smoothmac.smoothsnap
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"

targets:
  SmoothSnap:
    type: application
    platform: macOS
    sources:
      - path: SmoothSnap
        excludes:
          - "**/*.entitlements"
    info:
      path: SmoothSnap/Info.plist
      properties:
        LSUIElement: true                          # hide from Dock — menu bar only
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        CFBundleDisplayName: SmoothSnap
        NSAppleEventsUsageDescription: "SmoothSnap needs Accessibility access to detect window drags and resize windows."
    entitlements:
      path: SmoothSnap/SmoothSnap.entitlements
      properties:
        com.apple.security.app-sandbox: true
        # Required for AXUIElement window frame manipulation in sandbox.
        # NSEvent global monitors do NOT require this; AXUIElement does.
        com.apple.security.temporary-exception.accessibility: true
    dependencies:
      - sdk: Carbon.framework
    settings:
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: 9K2LBNXSNU
      # Sandbox enabled — required for Mac App Store distribution
      # NSEvent global monitors work within the sandbox.
      # AXUIElement window control requires the accessibility temporary exception
      # entitlement (see SmoothSnap.entitlements).
      ENABLE_APP_SANDBOX: YES
      # Hardened runtime for notarization
      ENABLE_HARDENED_RUNTIME: YES
      INFOPLIST_FILE: SmoothSnap/Info.plist
